.scroll{position:relative;z-index:1;min-height:100vh;padding-bottom:96px}
.pad{padding:0 18px}

/* ===== top header ===== */
.appbar{position:sticky;top:0;z-index:30;background:rgba(251,248,244,.9);backdrop-filter:blur(12px);display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line)}
.appbar .logo{height:34px;cursor:pointer}
.appbar .sp{margin-left:auto}
.iconbtn{position:relative;width:42px;height:42px;border-radius:50%;background:var(--white);border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;color:var(--ink);box-shadow:var(--shadow-s)}
.iconbtn .dot{position:absolute;top:9px;right:10px;width:8px;height:8px;border-radius:50%;background:var(--rouge);border:2px solid var(--white)}

/* ===== buttons ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;cursor:pointer;font-weight:700;font-size:15px;padding:14px 20px;border-radius:999px;background:var(--rouge);color:#fff;transition:.16s;box-shadow:0 8px 20px rgba(216,30,44,.26)}
.btn:hover{transform:translateY(-2px)}.btn:active{transform:translateY(0)}
.btn.block{width:100%}
.btn.ink{background:var(--ink);box-shadow:0 8px 20px rgba(20,20,20,.22)}
.btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);box-shadow:none}
.btn.ghost:hover{border-color:var(--rouge);color:var(--rouge)}
.btn.sm{padding:10px 15px;font-size:13.5px}
.btn.lg{padding:16px 24px;font-size:16px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn.light{background:#fff;color:var(--rouge);box-shadow:var(--shadow-s)}

/* ===== bottom nav ===== */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;z-index:40;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;align-items:flex-end;justify-content:space-around;padding:8px 6px calc(8px + env(safe-area-inset-bottom,0));height:72px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:0;cursor:pointer;color:var(--muted2);font-size:10.5px;font-weight:700;padding:6px 0}
.tab .ic{width:23px;height:23px}
.tab.on{color:var(--rouge)}
.tab.fab{flex:0 0 auto;margin-top:-26px}
.tab.fab .b{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--rouge),var(--rouge-d));color:#fff;display:grid;place-items:center;box-shadow:0 10px 24px rgba(216,30,44,.45);border:4px solid var(--cream)}
.tab.fab .b .ic{width:26px;height:26px;stroke-width:2.2}
.tab.fab span{color:var(--rouge);margin-top:2px}

/* ===== home ===== */
.hero2{padding:18px 18px 6px;text-align:center}
.hero2 .loc{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-weight:600;font-size:12.5px;margin-bottom:10px}
.hero2 .loc .ic{width:15px;height:15px}
.hero2 h1{font-size:clamp(34px,9vw,46px)}
.hero2 .lead{color:var(--muted);font-size:14.5px;margin:10px auto 16px;max-width:520px}
.hero2 .acts{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.searchbar{display:flex;align-items:center;gap:10px;background:var(--white);border:1px solid var(--line);border-radius:16px;padding:13px 16px;margin:16px 18px 6px;box-shadow:var(--shadow-s);color:var(--muted)}
.searchbar input{border:0;outline:0;flex:1;font-family:inherit;font-size:14.5px;background:none;color:var(--ink)}
.searchbar .ic{width:19px;height:19px}

/* promo banner */
.promo{margin:14px 18px;border-radius:var(--r);padding:20px;background:linear-gradient(120deg,var(--rouge),var(--coral));color:#fff;position:relative;overflow:hidden;box-shadow:0 12px 26px rgba(216,30,44,.3)}
.promo::after{content:"";position:absolute;right:-26px;bottom:-40px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.12)}
.promo .tag{display:inline-block;background:rgba(255,255,255,.22);font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;padding:5px 10px;border-radius:999px;margin-bottom:10px}
.promo h3{font-size:24px;color:#fff;position:relative;z-index:1}
.promo p{font-size:13px;opacity:.92;margin:4px 0 12px;position:relative;z-index:1}
.promo .pct{font-family:"Anton";font-size:30px;line-height:1;vertical-align:-2px}

/* section heads */
.shead{display:flex;align-items:baseline;justify-content:space-between;padding:20px 18px 12px}
.shead h2{font-size:22px}
.shead a{color:var(--rouge);font-weight:700;font-size:13px;display:flex;align-items:center;gap:2px;cursor:pointer}
.shead a .ic{width:15px;height:15px}
.eyebrow{font-weight:800;font-size:11.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--rouge)}

/* service icon row (home popular) */
.hscroll{display:flex;gap:12px;overflow-x:auto;padding:4px 18px 8px;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}
.scard{flex:0 0 auto;width:150px;background:var(--white);border:1px solid var(--line);border-radius:var(--r-s);padding:15px;box-shadow:var(--shadow-s);cursor:pointer;transition:.16s}
.scard:active{transform:scale(.98)}
.sico{width:50px;height:50px;border-radius:15px;display:grid;place-items:center;margin-bottom:12px}
.sico .ic{width:25px;height:25px;stroke-width:2}
.scard h4{font-size:14.5px;font-weight:800;margin-bottom:3px}
.scard .pr{font-family:"Anton";font-size:18px;color:var(--ink)}
.scard .pr small{font-family:"Manrope";font-weight:600;font-size:11px;color:var(--muted)}

/* prestations list (full) */
.svc2{display:flex;gap:14px;align-items:center;background:var(--white);border:1px solid var(--line);border-radius:var(--r-s);padding:14px;margin:0 18px 12px;box-shadow:var(--shadow-s);cursor:pointer;transition:.16s}
.svc2:active{transform:scale(.99)}
.svc2 .sico{margin:0}
.svc2 .mid{flex:1;min-width:0}
.svc2 .mid h4{font-size:15.5px;font-weight:800;margin-bottom:2px}
.svc2 .mid p{color:var(--muted);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.svc2 .rt{text-align:right;flex:0 0 auto}
.svc2 .rt b{font-family:"Anton";font-size:18px;display:block;line-height:1}
.svc2 .rt b small{font-family:"Manrope";font-weight:600;font-size:11px;color:var(--muted)}
.svc2 .rt .ic{width:18px;height:18px;color:var(--muted2);margin:4px 0 0 auto}

/* cards / reviews / trust */
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--r-s);padding:18px;box-shadow:var(--shadow-s)}
.reasons{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:4px 18px}
.reason{background:var(--white);border:1px solid var(--line);border-radius:var(--r-s);padding:15px;box-shadow:var(--shadow-s)}
.reason .ri{width:42px;height:42px;border-radius:12px;background:var(--rouge-soft);color:var(--rouge);display:grid;place-items:center;margin-bottom:10px}
.reason h4{font-size:14px;font-weight:800;margin-bottom:3px}
.reason p{font-size:12px;color:var(--muted);line-height:1.4}
.trust{display:flex;flex-wrap:wrap;gap:8px;padding:4px 18px}
.tchip{background:var(--white);border:1px solid var(--line);border-radius:999px;padding:9px 14px;font-weight:700;font-size:13px;box-shadow:var(--shadow-s)}
.rev{background:var(--white);border:1px solid var(--line);border-radius:var(--r-s);padding:16px;margin:0 18px 12px;box-shadow:var(--shadow-s)}
.stars{display:flex;gap:2px;color:#F5A623;margin-bottom:8px}.stars .ic{width:15px;height:15px}
.rev p{font-size:13.5px;margin-bottom:12px}
.who{display:flex;align-items:center;gap:10px}
.av{width:38px;height:38px;border-radius:50%;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:800;font-size:14px}
.who b{font-size:13.5px;display:block}.who small{color:var(--muted);font-size:11.5px}

/* generic page header (sub pages) */
.psub{display:flex;align-items:center;gap:12px;padding:14px 16px;position:sticky;top:0;z-index:30;background:rgba(251,248,244,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.psub .back{width:40px;height:40px;border-radius:50%;background:var(--white);border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;color:var(--ink);box-shadow:var(--shadow-s)}
.psub h2{font-size:19px}
.phero{padding:18px}
.phero .eyebrow{margin-bottom:6px}
.phero h1{font-size:30px;margin-bottom:8px}
.phero p{color:var(--muted);font-size:14px}

/* steps (rituel) */
.steps{padding:6px 18px}
.stp{display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line)}
.stp:last-child{border:0}
.stp .n{flex:0 0 auto;width:44px;height:44px;border-radius:13px;background:var(--ink);color:#fff;font-family:"Anton";font-size:20px;display:grid;place-items:center}
.stp h4{font-size:15.5px;font-weight:800;margin-bottom:2px}.stp p{color:var(--muted);font-size:13.5px}

/* gallery */
.galg{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:6px 18px}
.galg .ph{aspect-ratio:1;border-radius:var(--r-s);background:linear-gradient(135deg,var(--cream2),#E6DECF);display:grid;place-items:center;color:var(--muted2);font-size:12px;border:1px solid var(--line);cursor:pointer}
.galg .ph .ic{width:26px;height:26px;opacity:.5}

/* info lines (salon) */
.iline{display:flex;align-items:center;gap:14px;padding:14px;background:var(--white);border:1px solid var(--line);border-radius:var(--r-s);margin:0 18px 10px;box-shadow:var(--shadow-s)}
.iline .ii{width:42px;height:42px;border-radius:12px;background:var(--rouge-soft);color:var(--rouge);display:grid;place-items:center;flex:0 0 auto}
.iline .k{font-size:11.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.iline .v{font-size:14.5px;font-weight:700}

/* service detail */
.dhero{height:200px;background:linear-gradient(135deg,#2A2A2A,#161616);position:relative;display:flex;align-items:flex-end;padding:18px;color:#fff;overflow:hidden}

.dhero .dico{width:60px;height:60px;border-radius:18px;display:grid;place-items:center;position:relative;z-index:1;margin-bottom:8px}
.dback{position:absolute;top:14px;left:14px;z-index:2;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.16);backdrop-filter:blur(6px);display:grid;place-items:center;color:#fff;border:0;cursor:pointer}
.dbody{padding:18px}
.dtag{display:inline-block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:5px 11px;border-radius:999px;margin-bottom:10px}
.tag-fixe{background:var(--okbg);color:var(--ok)}.tag-horaire{background:#FEF1E2;color:#C9740F}.tag-devis{background:var(--rouge-soft);color:var(--rouge)}
.dmeta{display:flex;gap:10px;margin:14px 0}
.dmeta .m{flex:1;background:var(--white);border:1px solid var(--line);border-radius:var(--r-s);padding:13px;text-align:center;box-shadow:var(--shadow-s)}
.dmeta .m .ic{width:20px;height:20px;color:var(--rouge);margin:0 auto 6px}
.dmeta .m b{display:block;font-size:14px}.dmeta .m span{font-size:11px;color:var(--muted)}
.dgal{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}.dgal::-webkit-scrollbar{display:none}
.dgal .ph{flex:0 0 auto;width:130px;aspect-ratio:1;border-radius:var(--r-s);background:linear-gradient(135deg,var(--cream2),#E6DECF);display:grid;place-items:center;color:var(--muted2);font-size:11px;border:1px solid var(--line)}
.dockcta{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:14px 18px calc(14px + env(safe-area-inset-bottom,0));z-index:35;display:flex;align-items:center;gap:14px}
.dockcta .pr{flex:0 0 auto}.dockcta .pr b{font-family:"Anton";font-size:24px;display:block;line-height:1}.dockcta .pr span{font-size:11px;color:var(--muted)}

/* ===== overlay / sheet ===== */
.overlay{position:fixed;inset:0;z-index:80;background:rgba(20,20,20,.5);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.sheet{background:var(--cream);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;border-radius:24px 24px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.3);animation:up .26s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(40px);opacity:.5}to{transform:translateY(0);opacity:1}}
.sheet-h{position:sticky;top:0;background:var(--cream);display:flex;align-items:center;justify-content:space-between;padding:18px 20px 12px;z-index:2}
.sheet-h h3{font-size:20px}
.xbtn{background:var(--cream2);border:0;width:38px;height:38px;border-radius:50%;cursor:pointer;display:grid;place-items:center;color:var(--ink)}
.sheet-b{padding:6px 20px 24px}
.prog{display:flex;gap:6px;padding:0 20px 14px}
.prog i{height:5px;flex:1;border-radius:3px;background:var(--line)}.prog i.on{background:var(--rouge)}
.backlink{display:inline-flex;align-items:center;gap:6px;background:var(--cream2);border:0;border-radius:10px;padding:8px 12px;font-weight:700;cursor:pointer;font-size:13px;margin-bottom:14px;color:var(--ink)}
.backlink .ic{width:16px;height:16px}

/* forms */
label.f{display:block;font-weight:700;font-size:13px;margin:14px 0 6px}label.f .req{color:var(--rouge)}
.in{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:13px;background:var(--white);font-family:inherit;font-size:15px;color:var(--ink);transition:.15s}
.in:focus{outline:0;border-color:var(--rouge);box-shadow:0 0 0 3px rgba(216,30,44,.12)}
textarea.in{min-height:80px;resize:vertical}
.opts{display:grid;gap:9px;margin-top:4px}
.opt{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1.5px solid var(--line);border-radius:13px;background:var(--white);cursor:pointer;font-weight:600;font-size:14px;transition:.14s}
.opt.sel{border-color:var(--rouge);background:var(--rouge-soft)}
.opt .rd{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;display:grid;place-items:center}
.opt.sel .rd{border-color:var(--rouge)}.opt.sel .rd::after{content:"";width:10px;height:10px;border-radius:50%;background:var(--rouge)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:420px){.grid2{grid-template-columns:1fr}}
.hint{font-size:12px;color:var(--muted);margin-top:6px}
.codebox{display:flex;gap:10px;justify-content:center;margin:18px 0}
.codebox input{width:54px;height:62px;text-align:center;font-size:26px;font-weight:800;border:1.5px solid var(--line);border-radius:14px;background:var(--white)}
.codebox input:focus{outline:0;border-color:var(--rouge);box-shadow:0 0 0 3px rgba(216,30,44,.12)}

/* auth */
.auth{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:30px 22px;position:relative;z-index:1}
.auth-logo{height:60px;margin:0 auto 20px}
.auth h2{text-align:center;font-size:26px}
.divider{display:flex;align-items:center;gap:12px;color:var(--muted2);font-size:12px;margin:18px 0}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
.linkbtn{background:none;border:0;color:var(--rouge);font-weight:700;cursor:pointer;font-family:inherit;font-size:14px}
.perks{background:linear-gradient(135deg,var(--rouge-soft),#FBE7D6);border:1px solid #F3D9C8;border-radius:16px;padding:16px;margin-bottom:18px}
.perks b{display:block;margin-bottom:8px}
.perks .pk{display:flex;gap:9px;align-items:center;font-size:13.5px;padding:3px 0}
.perks .pk .ic{width:18px;height:18px;color:var(--rouge)}

/* ===== ACCOUNT (dark) ===== */
.dark{background:var(--dk);color:#EDE9E2;min-height:100vh;position:relative;z-index:1;padding-bottom:96px}
.dark .dbar{position:sticky;top:0;z-index:30;background:rgba(22,22,22,.9);backdrop-filter:blur(12px);display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--dkline)}
.dark .dbar .logo{height:32px;filter:brightness(0) invert(1)}
.dark .dbar .sp{margin-left:auto}
.dark .ib{width:40px;height:40px;border-radius:50%;background:var(--dk3);border:1px solid var(--dkline);display:grid;place-items:center;color:#fff;cursor:pointer}
.dwrap{padding:18px}
.dhello{font-size:30px;color:#fff;margin-bottom:2px}
.dmut{color:#A8A199;font-size:13.5px}
.dpanel{background:var(--dk2);border:1px solid var(--dkline);border-radius:var(--r);padding:18px;margin-top:16px}
.dpanel h3{font-family:"Manrope";text-transform:none;letter-spacing:0;font-weight:800;font-size:16px;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.dpanel h3 .ic{width:18px;height:18px;color:var(--coral)}
/* loyalty */
.loy{background:linear-gradient(135deg,var(--rouge),var(--rouge-d));border-radius:var(--r);padding:20px;position:relative;overflow:hidden;box-shadow:0 14px 30px rgba(216,30,44,.35)}
.loy::after{content:"";position:absolute;right:-30px;top:-40px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.12)}
.loy .lh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;position:relative;z-index:1;color:#fff}
.loy .lh b{font-family:"Anton";font-size:18px}.loy .lh span{font-size:12px;opacity:.85}
.stamps{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;position:relative;z-index:1}
.stamp{aspect-ratio:1;border-radius:50%;border:2px dashed rgba(255,255,255,.4);display:grid;place-items:center;color:rgba(255,255,255,.4)}
.stamp .ic{width:18px;height:18px}
.stamp.on{border-style:solid;border-color:#fff;background:#fff;color:var(--rouge)}
.loy .rw{margin-top:14px;font-size:12.5px;background:rgba(0,0,0,.18);border-radius:11px;padding:10px 12px;position:relative;z-index:1;color:#fff}
.loy .rw b{color:#FFE08A}
/* rdv item dark */
.drdv{display:flex;gap:13px;align-items:center;padding:13px 0;border-bottom:1px solid var(--dkline)}.drdv:last-child{border:0}
.ddate{flex:0 0 auto;text-align:center;background:var(--dk3);border-radius:12px;padding:8px 11px;min-width:60px}
.ddate b{font-family:"Anton";font-size:20px;display:block;line-height:1;color:#fff}.ddate span{font-size:10px;text-transform:uppercase;color:#A8A199;font-weight:700}
.drdv .mid{flex:1}.drdv .mid b{font-size:14.5px;color:#fff}.drdv .mid span{display:block;color:#A8A199;font-size:12.5px}
.pill{font-size:10.5px;font-weight:800;text-transform:uppercase;padding:4px 9px;border-radius:999px;letter-spacing:.4px}
.pill.up{background:rgba(31,157,85,.2);color:#5FD68F}.pill.done{background:#333;color:#aaa}.pill.pend{background:rgba(240,138,36,.2);color:#F4A94C}
.code-tile{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--dkline)}.code-tile:last-child{border:0}
.code-tile .cc{font-family:monospace;letter-spacing:1px;font-weight:700;color:#fff;font-size:14px}
.code-tile .cs{font-size:12px;color:#A8A199}

/* ===== ADMIN (wallet style, responsive) ===== */
.admin{display:flex;min-height:100vh;background:var(--cream)}
.aside{flex:0 0 230px;background:var(--ink);color:#CFC9BE;padding:16px 12px;position:sticky;top:0;height:100vh;overflow-y:auto}
.aside .br{display:flex;align-items:center;gap:9px;padding:6px 8px 14px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:10px}
.aside .br .dm{width:32px;height:32px;border-radius:9px;background:var(--rouge);display:grid;place-items:center;color:#fff;font-family:"Anton";font-size:16px}
.aside .br b{font-family:"Anton";font-size:16px;color:#fff;letter-spacing:.5px}
.anav a{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:11px;font-weight:600;font-size:14px;cursor:pointer;color:#CFC9BE;transition:.14s}
.anav a:hover{background:rgba(255,255,255,.06);color:#fff}.anav a.on{background:var(--rouge);color:#fff}
.anav a .ic{width:19px;height:19px}
.amain{flex:1;min-width:0}
.atop{background:var(--white);border-bottom:1px solid var(--line);padding:16px 22px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
.atop h2{font-size:22px}.atop .sp{margin-left:auto}
.abody{padding:20px;padding-bottom:90px}
.amobtop{display:none}
.abottom{display:none}

/* wallet stat card */
.wcard{background:linear-gradient(135deg,var(--ink),#2A2A2A);border-radius:var(--r);padding:22px;color:#fff;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.wcard::after{content:"";position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(216,30,44,.5),transparent 70%)}
.wcard .lbl{font-size:12.5px;color:#B8B2A6;font-weight:600;position:relative;z-index:1}
.wcard .big{font-family:"Anton";font-size:44px;line-height:1.05;margin:6px 0 16px;position:relative;z-index:1}
.wchips{display:flex;gap:10px;flex-wrap:wrap;position:relative;z-index:1}
.wchip{background:rgba(255,255,255,.1);border-radius:12px;padding:10px 14px;flex:1;min-width:90px}
.wchip .ic{width:18px;height:18px;color:var(--coral);margin-bottom:5px}
.wchip b{font-family:"Anton";font-size:20px;display:block;line-height:1}.wchip span{font-size:11px;color:#B8B2A6}
.qrow{display:flex;gap:10px;margin-top:16px}
.qact{flex:1;background:var(--white);border:1px solid var(--line);border-radius:var(--r-s);padding:14px 8px;text-align:center;cursor:pointer;box-shadow:var(--shadow-s);transition:.14s}
.qact:active{transform:scale(.97)}
.qact .qi{width:42px;height:42px;border-radius:12px;background:var(--rouge-soft);color:var(--rouge);display:grid;place-items:center;margin:0 auto 7px}
.qact span{font-size:11.5px;font-weight:700}
.panel{background:var(--white);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-s);padding:18px;margin-top:16px}
.panel h3{font-family:"Manrope";text-transform:none;letter-spacing:0;font-weight:800;font-size:16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.actline{display:flex;gap:13px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}.actline:last-child{border:0}
.actline .ai{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex:0 0 auto}
.actline .am{flex:1;min-width:0}.actline .am b{font-size:14px}.actline .am span{display:block;color:var(--muted);font-size:12px}
.actline .ar{text-align:right;font-size:13px;font-weight:700}
.tblwrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--line)}
table.tbl{width:100%;border-collapse:collapse;background:var(--white)}
table.tbl th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:12px 14px;border-bottom:1px solid var(--line);background:var(--cream2);white-space:nowrap}
table.tbl td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
table.tbl tr:last-child td{border:0}
.tag-sm{font-size:11px;font-weight:800;padding:3px 8px;border-radius:999px;white-space:nowrap}
.rowacts{display:flex;gap:6px;flex-wrap:wrap}
.stitle{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--rouge);font-weight:800;margin:4px 0 12px}

@media(max-width:820px){
  .aside{display:none}
  .amain{padding-bottom:80px}
  .atop{display:none}
  .amobtop{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--ink);color:#fff;position:sticky;top:0;z-index:25}
  .amobtop .dm{width:30px;height:30px;border-radius:8px;background:var(--rouge);display:grid;place-items:center;font-family:"Anton";font-size:15px}
  .amobtop b{font-family:"Anton";letter-spacing:.5px;font-size:16px}
  .amobtop .sp{margin-left:auto}
  .amobtop .lo{background:var(--dk3);border:0;color:#fff;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;cursor:pointer}
  .abody{padding:16px;padding-bottom:96px}
  .abottom{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(23,21,19,.97);backdrop-filter:blur(12px);border-top:1px solid #333;justify-content:space-around;padding:8px 4px calc(8px + env(safe-area-inset-bottom,0))}
  .abtab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:0;color:#9b958b;font-size:10px;font-weight:700;cursor:pointer;padding:6px 0}
  .abtab .ic{width:22px;height:22px}.abtab.on{color:#fff}
  .kpis-d{grid-template-columns:1fr 1fr!important}
}

/* toast */
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;z-index:120;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:100%;max-width:520px;padding:0 18px}
.toast{background:var(--ink);color:#fff;padding:12px 18px;border-radius:13px;font-size:14px;font-weight:600;box-shadow:var(--shadow);animation:tin .25s ease;max-width:100%}
.toast.ok{background:var(--ok)}.toast.red{background:var(--rouge)}
@keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* demo bar */
.demobar{position:fixed;left:50%;transform:translateX(-50%);bottom:80px;z-index:70;background:var(--ink);color:#fff;font-size:11.5px;font-weight:600;padding:8px 14px;border-radius:999px;box-shadow:var(--shadow);display:flex;gap:10px;align-items:center;max-width:92vw}
.demobar b{color:var(--orange)}
.demobar button{background:none;border:0;color:#fff;opacity:.6;cursor:pointer;font-size:15px}
.mt{margin-top:14px}.mt2{margin-top:22px}.center{text-align:center}
.flexb{display:flex;align-items:center;justify-content:space-between;gap:12px}

/* ================= BOTTOM BAR ================= */
function tabbar(active){
 const T=[["/","home","Accueil"],["/prestations","scissors","Prestations"],["FAB"],["/galerie","image","Galerie"],["/espace","user","Espace"]];
 return `<nav class="tabbar">${T.map(t=>{
   if(t[0]==="FAB")return `<button class="tab fab" onclick="startBooking()"><div class="b">${ic("calplus")}</div><span>Réserver</span></button>`;
   return `<button class="tab ${active===t[0]?'on':''}" onclick="go('${t[0]}')">${ic(t[1])}<span>${t[2]}</span></button>`;
 }).join("")}</nav>`;
}

/* ================= ROUTER ================= */
function router(){
 const h=location.hash.replace("#","")||"/";app.scrollTop=0;window.scrollTo(0,0);
 document.body.classList.toggle("full",h.startsWith("/admin/"));
 if(h==="/")return home();
 if(h==="/prestations")return prestations();
 if(h.startsWith("/p/"))return prestaDetail(h.split("/")[2]);
 if(h==="/rituel")return rituel();
 if(h==="/galerie")return galerie();
 if(h==="/salon")return salon();
 if(h==="/espace")return DB.session?account():login();
 if(h==="/login")return login();
 if(h==="/code")return codePage();
 if(h==="/signup")return signup();
 if(h==="/admin-login")return adminLogin();
 if(h.startsWith("/admin"))return admin(h.split("/")[2]||"dash");
 home();
}

/* ================= BOOKING ================= */
function startBooking(diagFirst=false,sid=null){
 bk={step:0,account:null,diagType:null,diag:{},sid:sid,date:null,client:{},done:false};
 if(DB.session){bk.account="in";bk.client=DB.session;bookingStep(1);}else bookingStep(0);
}
function bookingStep(step){
 bk.step=step;const steps=5;let body="";
 if(step===0){
  body=`<p class="dmut" style="color:var(--muted);margin-bottom:14px">Besoin juste d'un rendez-vous ? Continuez sans inscription, vous pourrez créer votre compte à la fin.</p>
   <div class="opts">
    <div class="opt" onclick="bk.account='in';go('/login');closeSheet()"><div class="rd"></div><div><b>J'ai déjà un compte</b><div class="hint">Connectez-vous pour retrouver vos RDV et votre fidélité.</div></div></div>
    <div class="opt" onclick="bk.account='guest';bookingStep(1)"><div class="rd"></div><div><b>Continuer sans inscription</b><div class="hint">Mini-diagnostic puis prise de RDV directe.</div></div></div>
   </div>`;
 } else if(step===1){
  body=`<p class="stitle">Mini-diagnostic</p><p style="color:var(--muted);font-size:13.5px;margin-bottom:12px">Choisissez la version courte ou complète.</p>
   <div class="opts" style="grid-template-columns:1fr 1fr">
    <div class="opt ${bk.diagType==='short'?'sel':''}" onclick="bk.diagType='short';bk.diag={};bookingStep(1)"><div class="rd"></div>Courte</div>
    <div class="opt ${bk.diagType==='full'?'sel':''}" onclick="bk.diagType='full';bk.diag={};bookingStep(1)"><div class="rd"></div>Complète</div></div>`;
  if(bk.diagType){const qs=bk.diagType==='short'?DB.diagShort:DB.diagFull;
   body+=`<div class="mt2">`+qs.map((q,i)=>`<label class="f">${esc(q.q)}</label><div class="opts">${q.o.map(o=>`<div class="opt ${bk.diag[i]===o?'sel':''}" onclick="bk.diag[${i}]='${esc(o)}';bookingStep(1)" style="padding:11px 13px">${esc(o)}</div>`).join("")}</div>`).join("")+`</div>`;
   const ok=qs.every((_,i)=>bk.diag[i]);body+=`<button class="btn block mt2" ${ok?"":"disabled"} onclick="bookingStep(2)">Continuer</button>`;}
 } else if(step===2){
  if(bk.account==="in"&&DB.session){bk.client=DB.session;return bookingStep(3);}
  const c=bk.client;
  body=`<p class="stitle">Vos informations</p><p style="color:var(--muted);font-size:13.5px;margin-bottom:4px">Champs obligatoires pour créer votre fiche.</p>
   <div class="grid2"><div><label class="f">Prénom <span class="req">*</span></label><input class="in" id="fp" value="${esc(c.prenom||'')}"></div>
   <div><label class="f">Nom <span class="req">*</span></label><input class="in" id="fn" value="${esc(c.nom||'')}"></div></div>
   <label class="f">Téléphone <span class="req">*</span></label><input class="in" id="ft" inputmode="tel" value="${esc(c.tel||'')}">
   <label class="f">Adresse <span class="req">*</span></label><input class="in" id="fa" value="${esc(c.adresse||'')}">
   <label class="f">Email <span class="req">*</span></label><input class="in" id="fe" inputmode="email" value="${esc(c.email||'')}">
   <button class="btn block mt2" onclick="saveFiche()">Continuer</button>`;
 } else if(step===3){
  body=`<p class="stitle">Choisissez votre prestation</p><div class="opts">${DB.services.map(s=>`<div class="opt ${bk.sid===s.id?'sel':''}" onclick="bk.sid='${s.id}';bookingStep(3)"><div class="rd"></div><div style="flex:1"><b>${esc(s.name)}</b><div class="hint">${s.type==='fixe'?money(s.price):s.type==='horaire'?money(s.price)+'/h':'sur devis dès '+money(s.price)}${s.diag?' · diagnostic':''}</div></div></div>`).join("")}</div>
   <button class="btn block mt2" ${bk.sid?"":"disabled"} onclick="bookingStep(4)">Choisir le créneau</button>`;
 } else if(step===4){
  const s=svc(bk.sid),days=["Mar 1","Mer 2","Jeu 3","Ven 4","Sam 5","Mar 8","Mer 9","Jeu 10"];
  body=`<p class="stitle">Créneau</p><div class="opts" style="grid-template-columns:1fr 1fr">${days.map(d=>`<div class="opt ${bk.date===d?'sel':''}" onclick="bk.date='${d}';bookingStep(4)" style="padding:11px 13px">${d} · 14h00</div>`).join("")}</div>
   <div class="card mt2" style="background:var(--cream2)"><div class="flexb"><span style="color:var(--muted)">Prestation</span><b>${esc(s.name)}</b></div>
   <div class="flexb mt"><span style="color:var(--muted)">Tarif</span><b>${s.type==='devis'?'dès '+money(s.price):s.type==='horaire'?money(s.price)+'/h':money(s.price)}</b></div>
   <div class="flexb mt"><span style="color:var(--muted)">Acompte</span><b style="color:var(--rouge)">${money(s.deposit)}</b></div>
   <div class="hint mt">Le solde se règle sur place. L'acompte remplit votre carte de fidélité.</div></div>
   <button class="btn block mt2" ${bk.date?"":"disabled"} onclick="payDeposit()">Payer l'acompte ${money(s.deposit)}</button>
   <p class="hint center mt">Paiement simulé (SumUp en production)</p>`;
 }
 const prog=`<div class="prog">${Array.from({length:steps}).map((_,i)=>`<i class="${i<=step?'on':''}"></i>`).join("")}</div>`;
 const minStep=DB.session?1:0;
 openSheet(`<div class="sheet-h"><h3>Réserver</h3><button class="xbtn" onclick="closeSheet()">${ic('x')}</button></div>${step>0?prog:""}<div class="sheet-b">${step>minStep?`<button class="backlink" onclick="bookingStep(${step-1})">${ic('chevl')} Retour</button>`:""}${body}</div>`);
}
function saveFiche(){const v=id=>($("#"+id).value||"").trim();const c={prenom:v("fp"),nom:v("fn"),tel:v("ft"),adresse:v("fa"),email:v("fe")};if(Object.values(c).some(x=>!x)){toast("Tous les champs sont obligatoires","red");return;}bk.client=c;bookingStep(3);}
function payDeposit(){
 const s=svc(bk.sid);let cl;
 if(bk.account==="in"&&DB.session)cl=DB.session;else{cl=DB.clients.find(x=>x.email.toLowerCase()===(bk.client.email||"").toLowerCase());if(!cl){cl={id:"c"+(DB.clients.length+1),...bk.client,stamps:0,bookings:[],codes:[]};DB.clients.push(cl);}}
 cl.bookings.unshift({id:"b"+Date.now(),sid:s.id,date:"2026-07-"+(bk.date.match(/\d+/)||[20])[0],status:"up",deposit:s.deposit,total:s.type==='fixe'?s.price:s.deposit});
 cl.stamps=Math.min(DB.loyalty.threshold,cl.stamps+1);bk.client=cl;
 const left=DB.loyalty.threshold-cl.stamps;
 openSheet(`<div class="sheet-h"><h3>Confirmé</h3><button class="xbtn" onclick="closeSheet()">${ic('x')}</button></div>
  <div class="sheet-b center">
   <div style="width:72px;height:72px;border-radius:50%;background:var(--ok);color:#fff;display:grid;place-items:center;margin:6px auto 14px">${ic('check')}</div>
   <h3 style="font-size:23px">Rendez-vous confirmé</h3>
   <p style="color:var(--muted);margin-top:8px">${esc(s.name)} · ${esc(bk.date)} · 14h00<br>Acompte de ${money(s.deposit)} réglé.</p>
   <div class="card mt2" style="background:var(--cream2);text-align:left"><b>+1 tampon de fidélité</b><p style="color:var(--muted);font-size:13.5px;margin-top:4px">${cl.stamps}/${DB.loyalty.threshold} tampons. ${left>0?`Plus que ${left} avant <b>${esc(DB.loyalty.reward)}</b>.`:`Récompense débloquée : <b>${esc(DB.loyalty.reward)}</b> !`}</p></div>
   ${bk.account!=="in"?`<div class="perks mt2" style="text-align:left"><b>Créez votre compte en 1 minute</b><p style="color:var(--ink2);font-size:13px;margin-bottom:8px">Retrouvez vos RDV, votre fidélité et recevez des codes de réduction.</p><button class="btn block" onclick="DB.session=bk.client;closeSheet();go('/espace')">Activer mon compte</button></div>`:`<button class="btn block mt2" onclick="closeSheet();go('/espace')">Voir mon espace</button>`}
   <button class="linkbtn mt2" onclick="closeSheet();go('/')">Retour à l'accueil</button>
  </div>`);
}

<script>
/* ===== COUCHE LIVE NexusAI ===== */
/* =====================================================================
   LOCKS BY AFRO — couche LIVE (Supabase + actions réelles)
   Surcharge la démo : données live, booking SumUp, espace compte (PIN),
   créneaux réels, code promo, fidélité, footer NexusAI, admin caché.
   ===================================================================== */
(function(){
  const CFG = window.LBA_CONFIG || {};
  const URL = CFG.SUPABASE_URL, KEY = CFG.SUPABASE_ANON_KEY;
  const supa = window.supabase.createClient(URL, KEY);
  window.__supa = supa;

  /* ---------- token / session ---------- */
  const getTok = () => localStorage.getItem("lba_token") || "";
  const setTok = t => t ? localStorage.setItem("lba_token", t) : localStorage.removeItem("lba_token");
  window.lbaLogout = function(){ setTok(""); DB.session = null; go("/"); };

  /* ---------- appel edge function ---------- */
  async function fn(path, body){
    body = body || {};
    if (getTok() && body.token === undefined) body.token = getTok();
    let r, j = {};
    try {
      r = await fetch(`${URL}/functions/v1/${path}`, {
        method: "POST",
        headers: { "Content-Type":"application/json", "apikey": KEY, "Authorization": "Bearer "+KEY },
        body: JSON.stringify(body),
      });
      try { j = await r.json(); } catch(e){}
      return Object.assign({ _ok: r.ok, _status: r.status }, j);
    } catch(e){ return { _ok:false, error:"Réseau indisponible." }; }
  }
  window.__fn = fn;

  /* ---------- helpers data ---------- */
  const ICONS=["scissors","spark","wrench","layers","refresh","gem","rocket","sun","gift","star","palette"];
  const TINTSK=["rose","peach","amber","clay","mint","lilac","gold"];
  let CFGMAP = {};   // site_settings brut
  let DIAGQ = null;  // diagnostic_questions (cache)

  function depositEuros(r){
    const price = r.price_cents||0;
    let d = 0;
    if (r.deposit_type==="none") d = 0;
    else if (r.deposit_type==="fixed") d = Math.min(r.deposit_value||0, price);
    else {
      if (r.deposit_value==null){
        const thr=(parseInt(CFGMAP.deposit_threshold_eur||"100",10)||100)*100;
        const gp=(parseInt(CFGMAP.deposit_pct||"50",10)||0);
        d = price>=thr ? Math.round(price*gp/100) : 0;
      } else d = Math.round(price * r.deposit_value/100);
    }
    return Math.round(d/100);
  }
  function mapSvc(r, i){
    return {
      id:r.id, name:r.name, type:"fixe", price:Math.round((r.price_cents||0)/100),
      deposit:depositEuros(r),
      dur: r.duree_txt || (r.duration_min ? r.duration_min+" min" : "—"),
      diag:true, icon:ICONS[i%ICONS.length], tint:TINTSK[i%TINTSK.length],
      desc:r.description||"", long:r.description||"",
      allowed:(r.allowed_weekdays&&r.allowed_weekdays.length)?r.allowed_weekdays:null,
      duration_min:r.duration_min||60, category:r.category||"",
    };
  }
  const DAYN=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
  const DAYS=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
  const MON=["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
  function hoursLabel(){
    const od=(CFGMAP.open_days||"2,3,4,5,6").split(",").map(x=>parseInt(x,10)).filter(x=>!isNaN(x)).sort((a,b)=>a-b);
    const hrs=(CFGMAP.hours||"").split(",").map(s=>s.trim()).filter(Boolean);
    let dpart="";
    if(od.length){ dpart = od.length>1 ? `${DAYS[od[0]]}–${DAYS[od[od.length-1]]}` : DAYS[od[0]]; }
    let hpart = hrs.length ? `${hrs[0]} → ${hrs[hrs.length-1]}` : "";
    return [dpart, hpart].filter(Boolean).join(" · ");
  }

  /* ---------- chargement données live ---------- */
  async function loadData(){
    const [{data:set},{data:svcs},{data:gal},{data:clo}] = await Promise.all([
      supa.from("site_settings").select("key,value"),

      code:(S.promo_code||"").trim(),

  /* ---------- diagnostic dynamique ---------- */
  async function loadDiag(){
    if (DIAGQ) return DIAGQ;
    const {data} = await supa.from("diagnostic_questions").select("*").order("sort_order",{ascending:true});
    DIAGQ = data||[];
    return DIAGQ;
  }
  const CONTACT_KEYS=["prenom","nom","tel","email"];

  /* ---------- créneaux réels ---------- */
  function openDays(svc){
    const od=(CFGMAP.open_days||"2,3,4,5,6").split(",").map(x=>parseInt(x,10)).filter(x=>!isNaN(x));
    const allow = svc&&svc.allowed ? svc.allowed : null;
    const out=[]; const now=new Date(); now.setHours(0,0,0,0);
    for(let i=0;i<35 && out.length<14;i++){
      const d=new Date(now.getTime()+i*864e5);
      const wd=d.getDay();
      const iso=d.toISOString().slice(0,10);
      if(!od.includes(wd)) continue;
      if(allow && !allow.includes(wd)) continue;
      if(DB.closures.includes(iso)) continue;
      out.push({iso,wd,dd:d.getDate(),mm:MON[d.getMonth()]});
    }
    return out;
  }
  async function timesFor(iso){
    const all=(CFGMAP.hours||"").split(",").map(s=>s.trim()).filter(Boolean);
    let busy=[]; try{ const {data}=await supa.rpc("busy_slots",{d:iso}); busy=(data||[]).map(String); }catch(e){}
    const today=new Date().toISOString().slice(0,10);
    const nowHM=new Date().toTimeString().slice(0,5);
    return all.filter(t=> !busy.includes(t) && !(iso===today && t<=nowHM));
  }

    const body=`<p class="stitle">Choisissez votre prestation</p><div class="opts">${DB.services.map(s=>

  async function bookDiag(){
    const qs = await loadDiag();
    const sess = DB.session;
    // prefill contact si connecté
    if (sess){ B.diag.prenom=B.diag.prenom||sess.prenom; B.diag.nom=B.diag.nom||sess.nom; B.diag.tel=B.diag.tel||sess.tel; B.diag.email=B.diag.email||sess.email; }
    const visible = qs.filter(q=> !q.conditional_on || (B.diag[q.conditional_on]||"")===q.conditional_value );
    let secs={}, order=[];
    visible.forEach(q=>{ const s=q.section||"Informations"; if(!secs[s]){secs[s]=[];order.push(s);} secs[s].push(q); });
    let body=`<p class="stitle">Votre diagnostic</p><p class="hint" style="margin-bottom:6px">Quelques questions pour préparer votre rendez-vous.</p>`;
    order.forEach(sec=>{
      body+=`<div style="font-weight:800;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--rouge);margin:16px 0 4px">${esc(sec)}</div>`;
      secs[sec].forEach(q=>{ body+=fieldHtml(q); });
    });
    body+=`<button class="btn block mt2" onclick="__diagNext()">Continuer</button>`;
    sheet("Réserver", body, 2);
  }
  function fieldHtml(q){
    const v=B.diag[q.q_key]; const req=q.required?' <span class="req">*</span>':"";
    const id="dq_"+q.q_key;
    if(q.field_type==="boolean"){
      return `<label class="f">${esc(q.label)}${req}</label><div class="opts" style="grid-template-columns:1fr 1fr">
        ${["Oui","Non"].map(o=>`<div class="opt ${v===o?'sel':''}" style="padding:11px 13px" onclick="__setDiag('${q.q_key}','${o}')"><div class="rd"></div>${o}</div>`).join("")}</div>`;
    }
    if(q.field_type==="select"){
      const opts=Array.isArray(q.options)?q.options:[];
      return `<label class="f">${esc(q.label)}${req}</label><div class="opts">
        ${opts.map(o=>`<div class="opt ${v===o?'sel':''}" style="padding:11px 13px" onclick="__setDiag('${q.q_key}',${JSON.stringify(o)})"><div class="rd"></div>${esc(o)}</div>`).join("")}</div>`;
    }
    if(q.field_type==="checkboxes"){
      const opts=Array.isArray(q.options)?q.options:[]; const arr=Array.isArray(v)?v:[];
      return `<label class="f">${esc(q.label)}${req}</label><div class="opts">
        ${opts.map(o=>`<div class="opt ${arr.includes(o)?'sel':''}" style="padding:11px 13px" onclick="__toggleDiag('${q.q_key}',${JSON.stringify(o)})"><div class="rd"></div>${esc(o)}</div>`).join("")}</div>`;
    }
    if(q.field_type==="textarea"){
      return `<label class="f">${esc(q.label)}${req}</label><textarea class="in" oninput="__df('${q.q_key}',this.value)">${esc(v||"")}</textarea>`;
    }
    const it = q.field_type==="email"?"email":q.field_type==="tel"?"tel":q.field_type==="number"?"numeric":"text";
    return `<label class="f">${esc(q.label)}${req}</label><input class="in" inputmode="${it}" value="${esc(v||"")}" oninput="__df('${q.q_key}',this.value)">`;
  }
  window.__setDiag=function(k,val){ B.diag[k]=val; bookDiag(); };
  window.__toggleDiag=function(k,val){ let a=Array.isArray(B.diag[k])?B.diag[k].slice():[]; const i=a.indexOf(val); if(i>=0)a.splice(i,1); else a.push(val); B.diag[k]=a; bookDiag(); };
  window.__diagNext=async function(){
    const qs=await loadDiag();
    const visible=qs.filter(q=> !q.conditional_on || (B.diag[q.conditional_on]||"")===q.conditional_value );

    const em=(B.diag.email||"").trim();
    if(!em || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)){ toast("Email valide requis.","red"); return; }
    bookSlot();

  async function bookSlot(reportMode){
    const svc0=DB.services.find(s=>s.id===B.sid);
    const days=openDays(svc0);
    if(!B.iso && days.length) B.iso=days[0].iso;
    let times = B.iso ? await timesFor(B.iso) : [];
    const dchips = days.map(d=>`<div class="opt ${B.iso===d.iso?'sel':''}" style="padding:10px 12px;justify-content:center;flex-direction:column;gap:2px" onclick="__pickDay('${d.iso}',${reportMode?1:0})"><b style="font-family:Anton;font-size:18px">${d.dd}</b><span style="font-size:11px;color:var(--muted)">${DAYS[d.wd]} ${d.mm}</span></div>`).join("");
    const tchips = times.length ? times.map(t=>`<div class="opt ${B.time===t?'sel':''}" style="padding:11px 13px;justify-content:center" onclick="__pickTime('${t}',${reportMode?1:0})">${t}</div>`).join("") : `<p class="hint">Aucun créneau libre ce jour. Choisissez une autre date.</p>`;
    let body=`<p class="stitle">Choisissez la date</p><div class="opts" style="grid-template-columns:repeat(4,1fr)">${dchips||'<p class="hint">Aucune date disponible.</p>'}</div>

    if(reportMode){
      body+=`<button class="btn block mt2" ${B.iso&&B.time?'':'disabled'} onclick="__doReport()">Confirmer le report</button>`;
      sheet("Reporter le RDV", body, 0);
    } else {
      body+=`<button class="btn block mt2" ${B.iso&&B.time?'':'disabled'} onclick="bookRecap()">Continuer</button>`;
      sheet("Réserver", body, 3);

  /* ---------- session (me) ---------- */
  async function ensureSession(){
    if(!getTok()){ DB.session=null; return; }
    const r=await fn("account",{action:"me"});
    if(r.client){
      const today=new Date().toISOString().slice(0,10);
      const bookings=(r.bookings||[]).filter(b=>b.status!=="cancelled").map(b=>{
        const iso=(b.start_at||"").slice(0,10);
        const up = (b.status==="pending"||b.status==="confirmed") && iso>=today;
        return { id:b.id, sid:b.service_id, name:b.service_name, date:iso, time:(b.start_at||"").slice(11,16),
                 status: up?"up":"done", deposit:Math.round((b.deposit_amount_cents||0)/100), total:Math.round((b.total_amount_cents||0)/100) };
      });
      const nm=(r.client.full_name||"").split(" ");
      DB.session={ id:r.client.id, prenom:nm[0]||"", nom:nm.slice(1).join(" "), email:r.client.email, tel:r.client.phone||"",
        stamps:(r.loyalty&&r.loyalty.stamps)||0, bookings, codes:(r.codes||[]).map(c=>({code:c.code,percent:c.percent,used:false})) };
      if(r.loyalty){ DB.loyalty.threshold=r.loyalty.threshold; DB.loyalty.reward=r.loyalty.reward_label; }
    } else { setTok(""); DB.session=null; }
  }

        ${can?`<p class="hint mt">Modification possible jusqu'à 48h avant le rendez-vous.</p>
        <button class="btn block mt2" onclick="__report('${id}')">Reporter</button>
        <button class="btn ghost block mt" style="color:var(--rouge);border-color:var(--rouge)" onclick="__cancel('${id}')">Annuler le rendez-vous</button>`
        :`<p class="hint mt">Ce rendez-vous ne peut plus être modifié en ligne.</p>`}
      </div>`);
  };
  window.__cancel=async function(id){
    const r=await fn("account",{action:"cancel_booking",booking_id:id});
    if(r.ok){ toast("Rendez-vous annulé.","ok"); closeSheet(); await ensureSession(); account(); }
    else toast(r.error||"Annulation impossible.","red");
  };
  window.__report=function(id){
    const b=DB.session.bookings.find(x=>x.id===id);
    B={ sid:b.sid, reportId:id, iso:null, time:null };
    bookSlot(true);
  };
  window.__doReport=async function(){
    const start_at=`${B.iso}T${B.time}:00.000Z`;
    const r=await fn("account",{action:"report_booking",booking_id:B.reportId,new_start_at:start_at});
    if(r.ok){ toast("Rendez-vous reporté.","ok"); closeSheet(); await ensureSession(); account(); }
    else toast(r.error||"Report impossible.","red");
  };
  window.reportRdv=function(id){ window.__report(id); };
  window.cancelRdv=function(id){ window.__cancel(id); };

  /* ---------- fond réglable ---------- */
  window.applyBg=function(){
    const op=(DB.settings&&typeof DB.settings.bgOpacity==="number")?DB.settings.bgOpacity:4;
    const mode=DB.settings?DB.settings.bgMode:"logo";
    let st=document.getElementById("bgctl"); if(!st){ st=document.createElement("style"); st.id="bgctl"; document.head.appendChild(st); }
    st.textContent = mode==="none" ? "body::before{display:none}" : `body::before{display:block;opacity:${(op/100).toFixed(3)}}`;
  };

  /* ---------- footer NexusAI ---------- */
  function injectFooter(){
    if(!DB.footerOn) return;
    const sc=document.querySelector(".scroll"); if(!sc||sc.querySelector(".lbafoot")) return;
    const logo = window.__NEXUS_LOGO || "";
    const inner=`<div class="lbafoot" style="text-align:center;padding:26px 18px 30px;color:var(--muted)">
      <div style="font-size:11px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px">Propulsé par</div>
      ${logo?`<img src="${logo}" alt="NexusAI Agency" style="height:30px;margin:0 auto;opacity:.9">`:`<b style="color:var(--ink)">NexusAI Agency</b>`}
    </div>`;
    const wrap=document.createElement("div");
    wrap.innerHTML=inner;
    const node=wrap.firstElementChild;
    if(DB.footerUrl){ const a=document.createElement("a"); a.href=DB.footerUrl; a.target="_blank"; a.rel="noopener"; a.appendChild(node); sc.appendChild(a); }
    else sc.appendChild(node);
  }

  /* ---------- galerie live ---------- */
  window.galerie=function(){
    const items = (DB.gallery&&DB.gallery.length)?DB.gallery:null;
    const grid = items
      ? items.map(g=>`<div class="ph" style="background:#000;padding:0;overflow:hidden"><img src="${g.url}" alt="${esc(g.cap||'')}" style="width:100%;height:100%;object-fit:cover"></div>`).join("")
      : Array.from({length:6}).map(()=>`<div class="ph">${ic('image')}</div>`).join("");
    app.innerHTML=`<div class="psub"><button class="back" onclick="go('/')">${ic('chevl')}</button><h2>Galerie</h2></div>
      <div class="scroll"><div class="phero"><div class="eyebrow">Galerie</div><h1>Le travail</h1><p>Quelques réalisations.</p></div>
      <div class="galg">${grid}</div></div>${tabbar('/galerie')}`;
    applyBg();
  };

  /* ===================================================================
     ROUTER (live) — gère ?reset / ?paid, espace async, admin caché
     =================================================================== */
  window.router = async function(){
    const params=new URLSearchParams(location.search);
    if(params.get("reset")){ window.__resetScreen(params.get("reset")); return; }
    if(params.get("paid")){
      history.replaceState(null,"",location.pathname);
      openSheet(`<div class="sheet-h"><h3>Merci</h3><button class="xbtn" onclick="closeSheet()">${ic('x')}</button></div>
        <div class="sheet-b center"><div style="width:72px;height:72px;border-radius:50%;background:var(--ok);color:#fff;display:grid;place-items:center;margin:6px auto 14px">${ic('check')}</div>
        <h3 style="font-size:22px">Paiement reçu</h3><p style="color:var(--muted);margin-top:8px">Votre acompte est confirmé. Un email de confirmation vous a été envoyé.</p>
        <button class="btn block mt2" onclick="closeSheet();${getTok()?"go('/espace')":"go('/')"}">Continuer</button></div>`);
    }
    const h=location.hash.replace("#","")||"/";
    if(typeof app!=="undefined"&&app){ app.scrollTop=0; } window.scrollTo(0,0);
    document.body.classList.remove("full");
    if(h.startsWith("/admin")){ window.location.href="/pilotage.html"; return; }
    if(h==="/")return home();
    if(h==="/prestations")return prestations();
    if(h.startsWith("/p/"))return prestaDetail(h.split("/")[2]);
    if(h==="/rituel")return rituel();
    if(h==="/galerie")return galerie();
    if(h==="/salon")return salon();
    if(h==="/login")return login();
    if(h==="/signup")return signup();
    if(h==="/espace"){ await ensureSession(); return DB.session?account():login(); }
    home();
  };

  /* ---------- admin caché : 5 taps sur le logo ---------- */
  let taps=0, tapT=0;
  document.addEventListener("click",function(e){
    const lg=e.target.closest(".appbar .logo, .dbar .logo, .auth-logo");
    if(!lg) return;
    const now=Date.now(); if(now-tapT>700) taps=0; tapT=now; taps++;
    if(taps>=5){ taps=0; window.location.href="/pilotage.html"; }
  }, true);

  /* ---------- post-render : footer (après chaque rendu de page site) ---------- */
  const _origGo=window.go;
  // on injecte le footer via un observer léger sur #app
  const mo=new MutationObserver(()=>{ try{ injectFooter(); }catch(e){} });
  mo.observe(document.getElementById("app"),{childList:true,subtree:false});

  /* ---------- exposition globale (appels depuis onclick/oninput inline) ---------- */
  window.bookService=bookService; window.bookDiag=bookDiag; window.bookSlot=bookSlot; window.bookRecap=bookRecap;
  window.__df=function(k,v){ B.diag[k]=v; };

  /* ===================================================================
     BOOT
     =================================================================== */
  async function boot(){
    try{ await loadData(); }catch(e){ console.error("loadData",e); }
    applyBg();
    window.addEventListener("hashchange", window.router);
    await window.router();
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",boot);
  else boot();
})();

</script>
</body>
</html>
