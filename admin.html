<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Pilotage — Locks by Afro</title>
<meta name="theme-color" content="#16130F">
<link rel="manifest" href="manifest-admin.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<script src="config.js"></script>
<style>
:root{--red:#D81E2C;--red2:#b3151f;--ink:#16130F;--cream:#F6F1E8;--card:#ffffff;--line:#ece4d6;--muted:#8a8276;--ok:#1d8a4e;--amber:#b9821a;--blue:#2563a8;--gray:#6b6b6b}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--cream);color:var(--ink);font-size:15px;line-height:1.45}
#app{max-width:560px;margin:0 auto;min-height:100vh;background:var(--cream);position:relative;padding-bottom:40px}
.bar{position:sticky;top:0;z-index:20;background:var(--ink);color:#fff;display:flex;align-items:center;gap:10px;padding:14px 16px;padding-top:max(14px,env(safe-area-inset-top))}
.bar .lg{font-weight:800;letter-spacing:.3px}
.bar .lg small{display:block;font-weight:500;font-size:11px;opacity:.6;letter-spacing:1px;text-transform:uppercase}
.bar .sp{flex:1}
.bar button{background:rgba(255,255,255,.12);color:#fff;border:0;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600}
.tabs{position:sticky;top:54px;z-index:15;display:flex;gap:7px;overflow-x:auto;padding:10px 12px;background:var(--cream);border-bottom:1px solid var(--line);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{flex:0 0 auto;background:#fff;border:1px solid var(--line);color:var(--ink);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;white-space:nowrap}
.tabs button.on{background:var(--red);border-color:var(--red);color:#fff}
#view{padding:14px}
h2{font-size:18px;margin:2px 0 12px}
h3{font-size:15px;margin:0 0 8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.muted{color:var(--muted)}
.row{display:flex;gap:10px;align-items:center}
.between{display:flex;justify-content:space-between;align-items:center;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px}
.kpi .n{font-size:26px;font-weight:800;line-height:1}
.kpi .l{font-size:12px;color:var(--muted);margin-top:6px}
label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;font-weight:600}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-size:15px;background:#fff;color:var(--ink);font-family:inherit}
textarea{min-height:74px;resize:vertical}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--red);color:#fff;border:0;border-radius:12px;padding:12px 16px;font-size:15px;font-weight:700;width:100%;cursor:pointer}
.btn:active{transform:scale(.99)}
.btn.sec{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.dark{background:var(--ink)}
.btn.sm{padding:8px 12px;font-size:13px;width:auto}
.btn.gho{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn.danger{background:#fff;color:var(--red);border:1px solid #f0c9cc}
.list .it{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}
.list .it:last-child{border-bottom:0}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
.pill.amber{background:#fdf2dc;color:var(--amber)}
.pill.ok{background:#e2f4ea;color:var(--ok)}
.pill.blue{background:#e4eef8;color:var(--blue)}
.pill.red{background:#fde3e5;color:var(--red)}
.pill.gray{background:#eee;color:var(--gray)}
.tag{font-size:11px;color:var(--muted)}
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--cream);width:100%;max-width:560px;max-height:92vh;overflow:auto;border-radius:20px 20px 0 0;padding:16px;padding-bottom:max(20px,env(safe-area-inset-bottom))}
.sheet .hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sheet .x{background:#fff;border:1px solid var(--line);border-radius:10px;width:34px;height:34px;font-size:18px;line-height:1}
.daysel{display:flex;gap:6px;flex-wrap:wrap}
.daysel .d{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 0;width:46px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;user-select:none}
.daysel .d.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.kv{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:14px}
.kv:last-child{border-bottom:0}
.kv span{color:var(--muted)}
.thumb{position:relative;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:#fff}
.thumb img{width:100%;height:110px;object-fit:cover;display:block}
.thumb .del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;border:0;border-radius:8px;width:30px;height:30px;font-size:16px}
.gal{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 16px;border-radius:12px;font-size:14px;z-index:60;opacity:0;transition:opacity .2s;max-width:90%}
.toast.show{opacity:1}
.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth{background:#fff;border:1px solid var(--line);border-radius:20px;padding:24px;max-width:380px;width:100%;text-align:center}
.auth .logo{width:64px;height:64px;border-radius:18px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;margin:0 auto 14px}
.auth h1{font-size:20px;margin:0 0 4px}
.auth p{color:var(--muted);font-size:13px;margin:0 0 18px}
.err{color:var(--red);font-size:13px;margin-top:10px;min-height:16px}
.spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px}
@keyframes sp{to{transform:rotate(360deg)}}
.pininput{letter-spacing:8px;text-align:center;font-size:22px;font-weight:700}
/* ===== Refonte « wallet » — rouge/noir Locks ===== */
#view{padding-bottom:104px}
.topbar{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,#16130F 0%,#2a1113 52%,#7a1620 100%);color:#fff;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px;padding-top:max(16px,env(safe-area-inset-top));border-radius:0 0 24px 24px}
.topbar .who{display:flex;align-items:center;gap:12px;min-width:0}
.topbar .ava{width:42px;height:42px;border-radius:14px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;letter-spacing:.5px;flex:0 0 auto}
.topbar .hi{font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;opacity:.6;line-height:1}
.topbar .hello{font-size:17px;font-weight:800;line-height:1.2;margin-top:2px}
.topbar .trow{display:flex;gap:8px;flex:0 0 auto}
.topbar .ic{background:rgba(255,255,255,.12);color:#fff;border:0;border-radius:12px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;padding:0}
.topbar .ic svg{width:19px;height:19px}
.hero{background:linear-gradient(140deg,#1b1712 0%,#3a141a 50%,#9a1a26 100%);color:#fff;border-radius:24px;padding:20px;margin-bottom:14px;box-shadow:0 12px 26px -14px rgba(154,26,38,.55)}
.hero .lab{font-size:11.5px;letter-spacing:1.2px;text-transform:uppercase;opacity:.72;text-align:center}
.hero .amt{font-size:34px;font-weight:800;text-align:center;margin:5px 0 3px;letter-spacing:.4px}
.hero .sub{font-size:12.5px;text-align:center;opacity:.82;margin-bottom:15px}
.hero .hbtns{display:flex;gap:10px}
.hero .hbtns button{flex:1;background:#fff;color:#16130F;border:0;border-radius:14px;padding:12px;font-size:14px;font-weight:700}
.hero .hbtns button.alt{background:rgba(255,255,255,.15);color:#fff}
.circles{display:flex;justify-content:space-between;gap:6px;margin-bottom:14px}
.circles .c{flex:1;background:transparent;border:0;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer}
.circles .c .ico{width:54px;height:54px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 7px rgba(0,0,0,.05)}
.circles .c .ico svg{width:22px;height:22px}
.circles .c .lbl{font-size:11.5px;font-weight:600;color:var(--ink)}
.circles .c:nth-child(1) .ico{color:var(--red)}
.circles .c:nth-child(2) .ico{color:#1d8a4e}
.circles .c:nth-child(3) .ico{color:#2563a8}
.circles .c:nth-child(4) .ico{color:#b9821a}
.bnav{position:fixed;left:50%;transform:translateX(-50%);bottom:max(14px,env(safe-area-inset-bottom));width:min(540px,calc(100% - 24px));background:#16130F;border-radius:24px;display:flex;align-items:center;justify-content:space-around;padding:9px 8px;z-index:30;box-shadow:0 14px 32px -10px rgba(0,0,0,.5)}
.bnav button{background:transparent;border:0;color:rgba(255,255,255,.5);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:4px 4px;flex:1}
.bnav button svg{width:21px;height:21px}
.bnav button.on{color:#fff}
.bnav button.ctr{flex:0 0 auto;gap:0}
.bnav button.ctr .bi{width:56px;height:56px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;margin-top:-24px;border:4px solid var(--cream);box-shadow:0 8px 18px -4px rgba(216,30,44,.6)}
.bnav button.ctr .bi svg{width:25px;height:25px;color:#fff}
.bnav button.ctr.on .bi{background:var(--red2)}
.morelist{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.moreit{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 12px;font-size:14px;font-weight:600;color:var(--ink);text-align:left}
@media(min-width:640px){
  #app{max-width:600px}
  .circles .c .ico{width:58px;height:58px}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
const _CFG=window.LBA_CONFIG||{};const _SUPA=((_CFG.SUPABASE_URL)||"https://gnbpaytmhigbbnijovlg.supabase.co").replace(/\/+$/,"");const FN=_SUPA+"/functions/v1/admin";
const ANON=(_CFG.SUPABASE_ANON_KEY)||"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImduYnBheXRtaGlnYmJuaWpvdmxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDM0MjEsImV4cCI6MjA5NzI3OTQyMX0.kmBbASuLU5ak9LQksZ8nBffty46J58VuyQgqs4iMGKo";
let TOKEN=localStorage.getItem("lba_admin")||"";
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
let DATA={};
let TAB="dash";

const app=document.getElementById("app");
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const euro=(c)=>((+c||0)/100).toLocaleString("fr-FR",{minimumFractionDigits:0,maximumFractionDigits:2})+" €";
const DAYS=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
function dt(iso){if(!iso)return"";try{return new Date(iso).toLocaleString("fr-FR",{weekday:"short",day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})}catch{return iso}}
function dshort(iso){if(!iso)return"";try{return new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})}catch{return iso}}
let _tt;
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove("show"),2200)}

async function api(action,payload={}){
  const r=await fetch(FN,{method:"POST",headers:{"Content-Type":"application/json","apikey":ANON,"Authorization":"Bearer "+(TOKEN||ANON)},body:JSON.stringify(Object.assign({action,token:TOKEN||undefined},payload))});
  let j={};try{j=await r.json()}catch{}
  if(r.status===401){TOKEN="";localStorage.removeItem("lba_admin");authScreen(j.error||"Session expirée.");throw new Error("auth")}
  if(!r.ok)throw new Error(j.error||("Erreur "+r.status));
  return j;
}

/* ============== AUTH ============== */
async function boot(){
  if(TOKEN){try{await loadDash();return}catch(e){if(e.message==="auth")return}}
  let setup=false;
  try{const j=await api("need_setup");setup=!!j.setup}catch(e){authScreen("Connexion au serveur impossible.");return}
  authScreen(null,setup);
}

function authScreen(msg,setup){
  app.innerHTML=`<div class="center"><div class="auth">
    <div class="logo">LBA</div>
    <h1>${setup?"Créer le code admin":"Pilotage"}</h1>
    <p>${setup?"Choisis un code à 4 à 8 chiffres. À mémoriser : il protège l'accès au dashboard.":"Locks by Afro — espace gérant"}</p>
    <input id="pin" class="pininput" type="password" inputmode="numeric" maxlength="8" placeholder="••••" autocomplete="off">
    ${setup?'<input id="pin2" class="pininput" style="margin-top:10px" type="password" inputmode="numeric" maxlength="8" placeholder="confirmer" autocomplete="off">':""}
    <div style="margin-top:14px"><button id="go" class="btn">${setup?"Créer le code":"Entrer"}</button></div>
    <div class="err" id="err">${msg?esc(msg):""}</div>
  </div></div>`;
  const pin=$("pin");pin.focus();
  const submit=async()=>{
    const v=pin.value.trim();
    if(!/^\d{4,8}$/.test(v)){$("err").textContent="Code à 4 à 8 chiffres.";return}
    if(setup){const v2=$("pin2").value.trim();if(v!==v2){$("err").textContent="Les deux codes ne correspondent pas.";return}}
    const b=$("go");b.disabled=true;b.innerHTML='<span class="spin"></span>';
    try{
      const j=await api(setup?"set_pin":"login",{pin:v});
      if(j.token){TOKEN=j.token;localStorage.setItem("lba_admin",TOKEN);await loadDash()}
      else{$("err").textContent=j.error||"Erreur.";b.disabled=false;b.textContent=setup?"Créer le code":"Entrer"}
    }catch(e){$("err").textContent=e.message||"Erreur.";b.disabled=false;b.textContent=setup?"Créer le code":"Entrer"}
  };
  $("go").onclick=submit;
  pin.addEventListener("keydown",e=>{if(e.key==="Enter"&&!setup)submit()});
  if(setup)$("pin2").addEventListener("keydown",e=>{if(e.key==="Enter")submit()});
}

function logout(){TOKEN="";localStorage.removeItem("lba_admin");boot()}

/* ============== ICONS ============== */
const _SVG='fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"';
const IC={
  refresh:`<svg viewBox="0 0 24 24" ${_SVG}><path d="M20 11a8 8 0 1 1-2.3-5.7"/><path d="M20 4v5h-5"/></svg>`,
  exit:`<svg viewBox="0 0 24 24" ${_SVG}><path d="M15 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3"/><path d="M10 8l-4 4 4 4"/><path d="M6 12h10"/></svg>`,
  home:`<svg viewBox="0 0 24 24" ${_SVG}><path d="M3.5 10.5 12 3l8.5 7.5"/><path d="M5.5 9.5V21h5v-6h3v6h5V9.5"/></svg>`,
  users:`<svg viewBox="0 0 24 24" ${_SVG}><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20c0-3.3 2.5-5.5 5.5-5.5s5.5 2.2 5.5 5.5"/><path d="M16.5 6.3a3 3 0 0 1 0 5.4"/><path d="M21 20c0-2.5-1.5-4.4-3.6-5"/></svg>`,
  cal:`<svg viewBox="0 0 24 24" ${_SVG}><rect x="3.5" y="4.5" width="17" height="16" rx="3"/><path d="M3.5 9.5h17"/><path d="M8 3v3M16 3v3"/></svg>`,
  scissors:`<svg viewBox="0 0 24 24" ${_SVG}><circle cx="6" cy="6" r="2.4"/><circle cx="6" cy="18" r="2.4"/><path d="M8.2 7.6 20 18M8.2 16.4 20 6"/></svg>`,
  tag:`<svg viewBox="0 0 24 24" ${_SVG}><path d="M20.5 13.4 12.6 21.3a1.5 1.5 0 0 1-2.1 0L3 13.8V5a2 2 0 0 1 2-2h8.8z"/><circle cx="8" cy="8" r="1.3"/></svg>`,
  more:`<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="19" cy="12" r="1.7"/></svg>`
};

/* ============== SHELL ============== */
async function loadDash(){
  DATA=await api("bootstrap");
  renderShell();
  go(TAB);
}
const TABDEF=[["dash","Tableau"],["rdv","RDV"],["clients","Clients"],["presta","Prestations"],["dispo","Dispos"],["ferm","Fermetures"],["promo","Promos"],["fid","Fidélité"],["banner","Bannière"],["gal","Galerie"],["contenu","Contenu"],["apparence","Apparence"]];
function renderShell(){
  app.innerHTML=`
    <div class="topbar">
      <div class="who"><div class="ava">LA</div><div><div class="hi">Pilotage</div><div class="hello">Locks by Afro</div></div></div>
      <div class="trow">
        <button class="ic" onclick="loadDash()" aria-label="Rafraîchir">${IC.refresh}</button>
        <button class="ic" onclick="logout()" aria-label="Quitter">${IC.exit}</button>
      </div>
    </div>
    <div id="view"></div>
    <nav class="bnav">
      <button data-k="dash" onclick="go('dash')">${IC.home}<span>Tableau</span></button>
      <button data-k="clients" onclick="go('clients')">${IC.users}<span>Clients</span></button>
      <button class="ctr" data-k="rdv" onclick="go('rdv')"><span class="bi">${IC.cal}</span></button>
      <button data-k="presta" onclick="go('presta')">${IC.scissors}<span>Presta</span></button>
      <button data-k="plus" onclick="moreSheet()">${IC.more}<span>Plus</span></button>
    </nav>`;
}
function moreSheet(){
  const items=[["dispo","Disponibilités"],["ferm","Fermetures"],["promo","Promos"],["fid","Fidélité"],["banner","Bannière"],["gal","Galerie"],["contenu","Contenu"],["apparence","Apparence"]];
  sheet(`<div class="hd"><h3>Plus d'outils</h3><button class="x" onclick="closeSheet(this)">×</button></div>
    <div class="morelist">${items.map(([k,l])=>`<button class="moreit" onclick="closeSheet(this);go('${k}')">${l}</button>`).join("")}</div>`);
}
function go(k){
  TAB=k;
  const main=["dash","rdv","clients","presta"];
  document.querySelectorAll(".bnav button").forEach(b=>{const dk=b.dataset.k;b.classList.toggle("on",dk===k||(dk==="plus"&&!main.includes(k)))});
  const map={dash:vDash,rdv:vRdv,clients:vClients,presta:vPresta,dispo:vDispo,ferm:vFerm,promo:vPromo,fid:vFid,banner:vBanner,gal:vGal,contenu:vContenu,apparence:vApparence};
  (map[k]||vDash)();
  window.scrollTo(0,0);
}
function setView(html){$("view").innerHTML=html}

/* ============== SHEETS ============== */
function sheet(html){
  let bg=document.createElement("div");bg.className="sheet-bg";
  bg.innerHTML=`<div class="sheet">${html}</div>`;
  bg.addEventListener("click",e=>{if(e.target===bg)bg.remove()});
  document.body.appendChild(bg);
  return bg;
}
function closeSheet(el){const bg=el.closest?el.closest(".sheet-bg"):null;(bg||document.querySelector(".sheet-bg"))?.remove()}

/* ============== PILLS ============== */
function statusPill(s){const m={pending:["amber","En attente"],confirmed:["ok","Confirmé"],done:["blue","Terminé"],cancelled:["red","Annulé"],no_show:["gray","No-show"]};const[c,l]=m[s]||["gray",s||"—"];return `<span class="pill ${c}">${l}</span>`}
function payPill(p){const m={unpaid:["gray","Non payé"],deposit_paid:["amber","Acompte payé"],paid:["ok","Payé"]};const[c,l]=m[p]||["gray",p||"—"];return `<span class="pill ${c}">${l}</span>`}

/* ============== DASH ============== */
function vDash(){
  const c=DATA.counts||{};
  const up=DATA.upcoming||[];
  setView(`
    <div class="hero">
      <div class="lab">Encaissé ce mois</div>
      <div class="amt">${euro(c.ca_month_cents||0)}</div>
      <div class="sub">${c.today||0} RDV aujourd'hui · ${c.upcoming||0} à venir · ${c.clients||0} clients</div>
      <div class="hbtns">
        <button onclick="go('rdv')">Voir les RDV</button>
        <button class="alt" onclick="go('clients')">Clients</button>
      </div>
    </div>

    active:$("p_active").value==="1",
    image_url:$("p_img").value.trim()||null,
    allowed_weekdays:days.length?days:null
  };

  setView(`<h2>Codes promo</h2>
    <div style="margin-bottom:12px"><button class="btn" onclick="promoNew()">+ Nouveau code</button></div>
    <div class="card"><div class="list" id="plist">${ps.length?ps.map(promoRow).join(""):'<div class="muted">Aucun code.</div>'}</div></div>`);
}
function promoRow(p){
  return `<div class="it">
    <div style="min-width:0">
      <div style="font-weight:700;letter-spacing:1px">${esc(p.code)} <span class="pill ${p.active?'ok':'gray'}">${p.active?"actif":"inactif"}</span></div>
      <div class="tag">−${p.percent}% · ${KINDLBL[p.kind]||p.kind}${p.single_use?" · usage unique":""}${p.expires_at?" · exp. "+dshort(p.expires_at):""}</div>
    </div>
    <div class="row" style="flex:0 0 auto">
      <button class="btn sm sec" onclick="promoToggle('${p.id}',${p.active?0:1})">${p.active?"Désactiver":"Activer"}</button>
      <button class="btn sm danger" onclick="promoDel('${p.id}')">×</button>
    </div>
  </div>`;
}
function promoNew(){
  sheet(`
    <div class="hd"><h3>Nouveau code promo</h3><button class="x" onclick="closeSheet(this)">×</button></div>
    <label>Type</label>
    <select id="pr_kind" onchange="promoKindUI()">
      <option value="campaign">Campagne (tout le monde)</option>
      <option value="nominative">Nominatif (un client)</option>
    </select>
    <div id="pr_emailwrap" style="display:none"><label>Email du client</label><input id="pr_email" type="email" placeholder="client@email.com"></div>
    <label>Code (laisser vide = généré)</label><input id="pr_code" placeholder="ex. RENTREE25" style="letter-spacing:1px">
    <label>Réduction (%)</label><input id="pr_pct" type="number" min="1" max="100" step="1" value="10">
    <label>Expiration (optionnel)</label><input id="pr_exp" type="date">
    <label>Usage unique par client</label><select id="pr_single"><option value="1" selected>Oui</option><option value="0">Non</option></select>
    <div style="margin-top:14px"><button class="btn" onclick="promoCreate()">Créer le code</button></div>
  `);
}
function promoKindUI(){$("pr_emailwrap").style.display=$("pr_kind").value==="nominative"?"block":"none"}
async function promoCreate(){
  const kind=$("pr_kind").value;
  const promo={kind,percent:parseInt($("pr_pct").value,10)||10,code:$("pr_code").value.trim()||undefined,expires_at:$("pr_exp").value||null,single_use:$("pr_single").value==="1"};
  if(kind==="nominative"){
    const em=$("pr_email").value.trim();if(!em){toast("Renseigne l'email du client.");return}
    try{const j=await api("clients",{q:em});const c=(j.clients||[]).find(x=>(x.email||"").toLowerCase()===em.toLowerCase())||(j.clients||[])[0];
      if(!c){toast("Aucun client avec cet email.");return}promo.client_id=c.id;
    }catch(e){if(e.message!=="auth")toast(e.message);return}
  }
  try{const j=await api("promo_save",{promo});toast("Code créé"+(j.code?" : "+j.code:"")+".");document.querySelector(".sheet-bg")?.remove();const r=await api("promos");DATA.promos=r.promos||[];go("promo")}
  catch(e){if(e.message!=="auth")toast(e.message)}
}
async function promoToggle(id,active){
  try{await api("promo_save",{promo:{id,active:!!active}});const r=await api("promos");DATA.promos=r.promos||[];go("promo")}
  catch(e){if(e.message!=="auth")toast(e.message)}
}
async function promoDel(id){
  if(!confirm("Supprimer ce code ?"))return;
  try{await api("promo_delete",{id});DATA.promos=(DATA.promos||[]).filter(p=>p.id!==id);go("promo");toast("Code supprimé.")}
  catch(e){if(e.message!=="auth")toast(e.message)}
}

  const S=DATA.settings||{};
  setView(`<h2>Programme fidélité</h2>
    <div class="card">
      <div class="between"><h3>Activer le programme</h3>
        <select id="fi_on" style="width:auto"><option value="1" ${S.loyalty_enabled==="1"?"selected":""}>Activé</option><option value="0" ${S.loyalty_enabled!=="1"?"selected":""}>Désactivé</option></select>
      </div>
      <p class="muted" style="margin:8px 0 0;font-size:13px">Un tampon est ajouté à chaque acompte payé.</p>
    </div>
    <div class="card">
      <label>Nombre de tampons pour la récompense</label><input id="fi_thr" type="number" min="1" step="1" value="${esc(S.loyalty_threshold||"10")}">
      <label>Réduction de la récompense (%)</label><input id="fi_pct" type="number" min="1" max="100" step="1" value="${esc(S.loyalty_reward_pct||"100")}">
      <label>Libellé de la récompense</label><input id="fi_lbl" value="${esc(S.loyalty_reward_label||"Entretien offert")}">
      <p class="muted" style="margin:10px 0 0;font-size:13px">Au seuil atteint, un code de récompense est généré automatiquement et les tampons sont remis à zéro.</p>

    <button class="btn" onclick="fidSave()">Enregistrer</button>`);
}
async function fidSave(){
  const patch={loyalty_enabled:$("fi_on").value,loyalty_threshold:String(parseInt($("fi_thr").value,10)||10),loyalty_reward_pct:String(parseInt($("fi_pct").value,10)||100),loyalty_reward_label:$("fi_lbl").value.trim()||"Récompense"};
  try{await api("settings_save",{patch});DATA.settings=Object.assign(DATA.settings||{},patch);toast("Fidélité enregistrée.")}
  catch(e){if(e.message!=="auth")toast(e.message)}
}

/* ============== BANNIÈRE ============== */
function vBanner(){
  const S=DATA.settings||{};
  setView(`<h2>Bannière promo</h2>
    <div class="card">
      <div class="between"><h3>Afficher la bannière</h3>
        <select id="b_on" style="width:auto"><option value="1" ${S.promo_active==="1"?"selected":""}>Visible</option><option value="0" ${S.promo_active!=="1"?"selected":""}>Masquée</option></select>
      </div>
    </div>
    <div class="card">
      <label>Titre</label><input id="b_lbl" value="${esc(S.promo_label||"Offre du moment")}">
      <label>Texte</label><textarea id="b_txt">${esc(S.promo_text||"")}</textarea>
      <div class="grid2">
        <div><label>Réduction (%)</label><input id="b_pct" type="number" min="0" max="100" step="1" value="${esc(S.promo_pct||"0")}"></div>
        <div><label>Code associé</label><input id="b_code" value="${esc(S.promo_code||"")}" style="letter-spacing:1px" placeholder="ex. PROMO10"></div>

async function bannerSave(){
  const patch={promo_active:$("b_on").value,promo_label:$("b_lbl").value.trim(),promo_text:$("b_txt").value.trim(),promo_pct:String(parseInt($("b_pct").value,10)||0),promo_code:$("b_code").value.trim().toUpperCase()};
  try{await api("settings_save",{patch});DATA.settings=Object.assign(DATA.settings||{},patch);toast("Bannière enregistrée.")}
  catch(e){if(e.message!=="auth")toast(e.message)}
}

/* ============== GALERIE ============== */
function vGal(){
  const g=(DATA.gallery||[]);
  setView(`<h2>Galerie</h2>
    <div class="card">
      <h3>Ajouter une photo</h3>
      <input id="g_file" type="file" accept="image/*">
      <label>Légende (optionnel)</label><input id="g_cap" placeholder="ex. Reprise des racines">
      <div style="margin-top:12px"><button class="btn" id="g_btn" onclick="galUpload()">Téléverser</button></div>
    </div>
    <div class="card">
      <h3>Photos (${g.length})</h3>
      <div class="gal" id="ggrid">${g.length?g.map(galCard).join(""):'<div class="muted">Aucune photo.</div>'}</div>
    </div>`);
}
function galCard(x){
  return `<div class="thumb"><img src="${esc(x.image_url)}" alt=""><button class="del" onclick="galDel('${x.id}')">×</button></div>`;
}
async function galUpload(){
  const f=$("g_file").files[0];if(!f){toast("Choisis une image.");return}
  const btn=$("g_btn");btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)});
    await api("gallery_upload",{b64,content_type:f.type||"image/jpeg",caption:$("g_cap").value.trim()||null});
    const j=await api("gallery");DATA.gallery=j.gallery||[];go("gal");toast("Photo ajoutée.");
  }catch(e){if(e.message!=="auth")toast(e.message);btn.disabled=false;btn.textContent="Téléverser"}
}
async function galDel(id){
  if(!confirm("Supprimer cette photo ?"))return;
  try{await api("gallery_del",{id});DATA.gallery=(DATA.gallery||[]).filter(x=>x.id!==id);go("gal");toast("Photo supprimée.")}
  catch(e){if(e.message!=="auth")toast(e.message)}
}

/* ============== CONTENU ============== */
function fld(label,id,val,ta){return `<label>${label}</label>${ta?`<textarea id="${id}">${esc(val||"")}</textarea>`:`<input id="${id}" value="${esc(val||"")}">`}`}
function vContenu(){
  const S=DATA.settings||{};
  setView(`<h2>Contenu du site</h2>
    <div class="card"><h3>Identité</h3>
      ${fld("Nom de l'établissement","ct_biz",S.business_name)}
      ${fld("Nom du site","ct_site",S.site_name)}
    </div>
    <div class="card"><h3>Accueil (hero)</h3>
      ${fld("Sur-titre","ct_hk",S.hero_kicker)}
      ${fld("Titre","ct_ht",S.hero_title)}
      ${fld("Sous-titre","ct_hs",S.hero_subtitle,1)}
      ${fld("Texte « À propos »","ct_about",S.about_text,1)}
    </div>
    <div class="card"><h3>Sections (titres)</h3>
      ${fld("Rituels — sur-titre","ct_rk",S.sec_rituel_kicker)}
      ${fld("Rituels — titre","ct_rt2",S.sec_rituel_title)}
      ${fld("Prestations — sur-titre","ct_pk",S.sec_presta_kicker)}
      ${fld("Prestations — titre","ct_pt",S.sec_presta_title)}
      ${fld("Galerie — sur-titre","ct_gk",S.sec_gal_kicker)}
      ${fld("Galerie — titre","ct_gt",S.sec_gal_title)}
    </div>
    <div class="card"><h3>Rituels (3 blocs)</h3>
      ${fld("Bloc 1 — titre","ct_r1t",S.rituel_1_title)}
      ${fld("Bloc 1 — texte","ct_r1x",S.rituel_1_text,1)}
      ${fld("Bloc 2 — titre","ct_r2t",S.rituel_2_title)}
      ${fld("Bloc 2 — texte","ct_r2x",S.rituel_2_text,1)}
      ${fld("Bloc 3 — titre","ct_r3t",S.rituel_3_title)}
      ${fld("Bloc 3 — texte","ct_r3x",S.rituel_3_text,1)}
    </div>
    <div class="card"><h3>Coordonnées</h3>
      ${fld("Adresse","ct_addr",S.address)}
      ${fld("Téléphone","ct_phone",S.phone)}
      ${fld("WhatsApp","ct_wa",S.whatsapp)}
      ${fld("Email","ct_email",S.email)}
      ${fld("Lien Google Maps","ct_maps",S.maps_url)}
      ${fld("Lien avis Google","ct_review",S.review_url||S.avis_url)}
    </div>
    <button class="btn" onclick="contenuSave()">Enregistrer le contenu</button>`);
}
async function contenuSave(){
  const v=(id)=>{const e=$(id);return e?e.value.trim():""};
  const patch={
    business_name:v("ct_biz"),site_name:v("ct_site"),
    hero_kicker:v("ct_hk"),hero_title:v("ct_ht"),hero_subtitle:v("ct_hs"),about_text:v("ct_about"),
    sec_rituel_kicker:v("ct_rk"),sec_rituel_title:v("ct_rt2"),
    sec_presta_kicker:v("ct_pk"),sec_presta_title:v("ct_pt"),
    sec_gal_kicker:v("ct_gk"),sec_gal_title:v("ct_gt"),
    rituel_1_title:v("ct_r1t"),rituel_1_text:v("ct_r1x"),
    rituel_2_title:v("ct_r2t"),rituel_2_text:v("ct_r2x"),
    rituel_3_title:v("ct_r3t"),rituel_3_text:v("ct_r3x"),
    address:v("ct_addr"),phone:v("ct_phone"),whatsapp:v("ct_wa"),email:v("ct_email"),
    maps_url:v("ct_maps"),review_url:v("ct_review"),avis_url:v("ct_review")
  };
  try{await api("settings_save",{patch});DATA.settings=Object.assign(DATA.settings||{},patch);toast("Contenu enregistré.")}
  catch(e){if(e.message!=="auth")toast(e.message)}
}

boot();
</script>
